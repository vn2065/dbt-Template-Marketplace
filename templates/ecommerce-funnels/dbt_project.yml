name: 'ecommerce_funnels'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_funnels'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  start_date: '2022-01-01'
  default_currency: 'USD'
  # RFM scoring periods (days)
  rfm_recency_days: 365
  rfm_frequency_min_orders: 2
  # Funnel definition (ordered steps)
  funnel_steps:
    - session_start
    - product_viewed
    - add_to_cart
    - checkout_started
    - purchase_completed

models:
  ecommerce_funnels:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
    metrics:
      +materialized: table
      +schema: metrics
