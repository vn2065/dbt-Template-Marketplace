name: 'fintech_analytics'
version: '1.0.0'
config-version: 2

profile: 'fintech_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  start_date: '2022-01-01'
  default_currency: 'USD'
  # Risk thresholds
  high_risk_score_threshold: 75
  medium_risk_score_threshold: 50
  # Reconciliation tolerance (in basis points)
  reconciliation_tolerance_bps: 5

models:
  fintech_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
    metrics:
      +materialized: table
      +schema: metrics

seeds:
  fintech_analytics:
    +schema: seeds
